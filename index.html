<!DOCTYPE html>
<!--activate jeykll-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Custom Keyboard Engine</title>
  <style>
    :root {
      --bg: #f3f2f1;
      --surface: #ffffff;
      --border: #dad9d8;
      --key-bg: #f7f7f9;
      --key-active: #e1dfdd;
      --text: #323130;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent;
      user-select: none; /* Prevents text selection inside the keyboard interface */
    }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Fixed Workspace holding the document page */
    .workspace {
      flex: 1;
      overflow-y: auto;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      background: var(--surface);
      width: 100%;
      max-width: 800px;
      min-height: calc(100% - 10px);
      padding: 24px 20px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      outline: none;
      line-height: 1.6;
      font-size: 16px;
      user-select: text; /* Re-enables text selection inside the actual document page */
    }

    /* Custom App-Native Software Keyboard Layout */
    .keyboard-panel {
      background: #eef1f5;
      border-top: 1px solid var(--border);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom)); /* Accounts for modern phone home bars */
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 1000;
    }

    .kbd-row {
      display: flex;
      justify-content: center;
      width: 100%;
      gap: 5px;
    }

    .key {
      flex: 1;
      height: 46px;
      max-width: 42px;
      background: var(--surface);
      border: none;
      border-radius: 5px;
      font-size: 18px;
      font-weight: 500;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 1px rgba(0,0,0,0.2);
      touch-action: manipulation;
    }

    .key:active {
      background: var(--key-active);
      transform: scale(0.96);
    }

    /* Double/Wide Action Keys Layout mapping */
    .key.wide { max-width: 65px; background: #d1d5db; font-size: 14px; }
    .key.space { max-width: 260px; }
    
    /* Active State Tracker style for the Shift toggle modifier */
    .key.active-mod { background: #0078d4; color: white; }
  </style>
</head>
<body>

  <!-- Writable Canvas -->
  <main class="workspace">
    <!-- inputmode="none" stops the mobile browser's default keyboard from triggering -->
    <div class="page" id="editor" contenteditable="true" inputmode="none">
      <p>Tap here to type using the native custom software keyboard below...</p>
    </div>
  </main>

  <!-- Native Keyboard UI Component Map -->
  <footer class="keyboard-panel" id="keyboard">
    <!-- Row 1 -->
    <div class="kbd-row">
      <button class="key">q</button><button class="key">w</button><button class="key">e</button><button class="key">r</button><button class="key">t</button><button class="key">y</button><button class="key">u</button><button class="key">i</button><button class="key">o</button><button class="key">p</button>
    </div>
    <!-- Row 2 -->
    <div class="kbd-row">
      <button class="key">a</button><button class="key">s</button><button class="key">d</button><button class="key">f</button><button class="key">g</button><button class="key">h</button><button class="key">j</button><button class="key">k</button><button class="key">l</button>
    </div>
    <!-- Row 3 -->
    <div class="kbd-row">
      <button class="key wide" id="shift-btn">Shift</button>
      <button class="key">z</button><button class="key">x</button><button class="key">c</button><button class="key">v</button><button class="key">b</button><button class="key">n</button><button class="key">m</button>
      <button class="key wide" data-action="backspace">⌫</button>
    </div>
    <!-- Row 4 -->
    <div class="kbd-row">
      <button class="key wide" data-action="bold"><b>B</b></button>
      <button class="key space" data-value=" ">Space</button>
      <button class="key wide" data-action="enter">↵</button>
    </div>
  </footer>

  <script>
    const editor = document.getElementById('editor');
    const keyboard = document.getElementById('keyboard');
    const shiftBtn = document.getElementById('shift-btn');
    
    let isShifted = false;
    let savedRange = null;

    // Track selection changes to remember where the user was looking/editing
    document.addEventListener('selectionchange', () => {
      const selection = window.getSelection();
      if (selection.rangeCount > 0 && editor.contains(selection.getRangeAt(0).commonAncestorContainer)) {
        savedRange = selection.getRangeAt(0).cloneRange();
      }
    });

    // Capture and restore selection focus cleanly
    function restoreFocus() {
      editor.focus();
      const selection = window.getSelection();
      if (savedRange) {
        selection.removeAllRanges();
        selection.addRange(savedRange);
      }
    }

    // High-Performance Core Keyboard Input Listener Interface (Event Delegation)
    keyboard.addEventListener('pointerdown', (e) => {
      e.preventDefault(); // Crucial: prevents text selection blur event focus drop
      
      const target = e.target.closest('button');
      if (!target) return;

      restoreFocus();

      // 1. Shift Key Processing Toggle
      if (target.id === 'shift-btn') {
        isShifted = !isShifted;
        shiftBtn.classList.toggle('active-mod', isShifted);
        document.querySelectorAll('.key:not(.wide)').forEach(key => {
          key.textContent = isShifted ? key.textContent.toUpperCase() : key.textContent.toLowerCase();
        });
        return;
      }

      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);

      // 2. Structural Action Processing Engine
      if (target.dataset.action) {
        const action = target.dataset.action;
        
        if (action === 'backspace') {
          if (range.collapsed) {
            // Move cursor back one character to remove it natively if no range text selection exists
            range.setStart(range.startContainer, Math.max(0, range.startOffset - 1));
          }
          range.deleteContents();
        } 
        else if (action === 'enter') {
          // Injects clean block elements natively at the precise cursor placement node
          const br = document.createElement('br');
          range.insertNode(br);
          range.setStartAfter(br);
          range.setEndAfter(br);
          selection.removeAllRanges();
          selection.addRange(range);
        }
        else if (action === 'bold') {
          document.execCommand('bold', false, null);
        }
        return;
      }

      // 3. Simple Text Injection Matrix Flow
      const value = target.dataset.value !== undefined ? target.dataset.value : target.textContent;
      range.deleteContents();
      
      const textNode = document.createTextNode(value);
      range.insertNode(textNode);
      
      // Move insertion coordinate directly past the text node entry
      range.setStartAfter(textNode);
      range.setEndAfter(textNode);
      selection.removeAllRanges();
      selection.addRange(range);

      // Reset shift key state after inserting a character
      if (isShifted) {
        isShifted = false;
        shiftBtn.classList.remove('active-mod');
        document.querySelectorAll('.key:not(.wide)').forEach(key => {
          key.textContent = key.textContent.toLowerCase();
        });
      }
    });
  </script>
</body>
</html>
